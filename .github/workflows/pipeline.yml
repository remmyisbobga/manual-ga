name: GCP Authentication Workflow

on: 
  push:
    branches:
      - main       # Trigger on the main branch
      - feature/*  # Trigger on all feature branches with the prefix "feature/"

jobs:
  authenticate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Authenticate with GCP
        env:
          GCP_JSON_KEY: ${{ secrets.GCP_JSON_KEY }}
        run: |
          echo "${GCP_JSON_KEY}" >
