name: Terraform Deployment

on:
  push:
    branches:
      - "feat/*"

jobs:
  terraform:
    name: Terraform Workflow
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Set up Google Cloud CLI
      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v1
        with:
          version: 'latest'

      # Step 3: Authenticate to GCP
      - name: Authenticate to GCP
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: |
          echo "${{ secrets.GCP_CREDENTIALS }}" | base64 --decode > $HOME/gcloud-key.json
          gcloud auth activate-service-account terraform-sa@myzesoftlyproject27.iam.gserviceaccount.com --key-file=$HOME/gcloud-key.json
          gcloud config set project myzesoftlyproject27

      # Step 4: Set up Terraform
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.6

      # Step 5: Terraform Init
      - name: Terraform Init
        run: terraform init

      # Step 6: Terraform Sanity Check
      - name: Terraform Sanity Check
        run: |
          terraform fmt -check
          terraform validate

      # Step 7: Terraform Plan
      - name: Terraform Plan
        run: terraform plan -out=tfplan -var="bucket_name=my-terraform-bucket" -var="google_credentials_file=/home/runner/gcloud-key.json" -var="project_id=myzesoftlyproject27" -var="region=us-central1"

      # Step 8: Terraform Apply
      - name: Terraform Apply
        if: success()
        run: terraform apply -auto-approve tfplan
