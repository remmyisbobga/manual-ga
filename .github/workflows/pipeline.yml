name: Terraform Deployment

on:
  push:
    branches:
      - "feat/*"

jobs:
  terraform:
    name: Terraform Workflow
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Set up Google Cloud CLI
      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v1
        with:
          version: 'latest'

      # Step 3: Authenticate using the Service Account JSON key
      - name: Authenticate to GCP
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: |
          # Write the GCP credentials to a file
          echo "${{ secrets.GCP_CREDENTIALS }}" > $HOME/gcloud-key.json

          # Debugging: Validate the JSON content (optional)
          cat $HOME/gcloud-key.json | jq . || echo "Invalid JSON in GCP_CREDENTIALS"

          # Authenticate with the Service Account
          gcloud auth activate-service-account terraform-sa@myzesoftlyproject27.iam.gserviceaccount.com --key-file=$HOME/gcloud-key.json
          
          # Set the GCP project
          gcloud config set project myzesoftlyproject27

      # Step 4: Set up Terraform
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.6

      # Step 5: Initialize Terraform
      - name: Terraform Init
        run: terraform init

      # Step 6: Terraform Format and Validate
      - name: Terraform Sanity Check
        run: |
          terraform fmt -check
          terraform validate

      # Step 7: Terraform Plan
      - name: Terraform Plan
        run: terraform plan -out=tfplan

      # Step 8: Terraform Apply
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/feat/')
        run: terraform apply -auto-approve tfplan
