name: Terraform Deployment

on:
  push:
    branches:
      - "feat/*"

jobs:
  terraform:
    name: Terraform Workflow
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Set up Google Cloud CLI
      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v1
        with:
          version: 'latest'

      # Step 3: Debug GCP Credentials (Optional for Debugging)
      - name: Debug GCP Credentials
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: |
          echo "$GCP_CREDENTIALS" | jq . || echo "Invalid JSON in GCP_CREDENTIALS"

      # Step 4: Authenticate to GCP
      - name: Authenticate to GCP
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: |
          # Write the GCP credentials to a file
          echo "$GCP_CREDENTIALS" > $HOME/gcloud-key.json

          # Validate the JSON content
          cat $HOME/gcloud-key.json | jq . || echo "Invalid JSON in GCP_CREDENTIALS"

          # Authenticate with the Service Account
          gcloud auth activate-service-account terraform-sa@myzesoftlyproject27.iam.gserviceaccount.com --key-file=$HOME/gcloud-key.json
          
          # Set the GCP project
          gcloud config set project myzesoftlyproject27

      # Step 5: Set up Terraform
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.6

      # Step 6: Initialize Terraform
      - name: Terraform Init
        run: terraform init

      # Step 7: Terraform Format and Validate
      - name: Terraform Sanity Check
        run: |
          terraform fmt -check
          terraform validate

      # Step 8: Terraform Plan
      - name: Terraform Plan
        run: terraform pl
