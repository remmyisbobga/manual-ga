name: Deploy Terraform to GCP

on:
  push:
    branches:
      - main
      - feat/* # Add feature branches trigger
  pull_request:
    branches:
      - main
      - feat/* # Trigger workflow on PRs targeting main or feature branches

jobs:
  terraform:
    name: Terraform Workflow
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: 1.5.6 # Replace with your desired version

    - name: Authenticate to GCP
      env:
        GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-key.json
      run: |
        echo "${{ secrets.GCP_CREDENTIALS_JSON }}" > $GOOGLE_APPLICATION_CREDENTIALS
        gcloud auth activate-service-account terraform-sa@myzesoftlyproject27.iam.gserviceaccount.com --key-file=$GOOGLE_APPLICATION_CREDENTIALS --project=myzesoftlyproject27

    - name: Terraform Init
      run: terraform init

    - name: Terraform Plan
      run: terraform plan -var="project_id=myzesoftlyproject27"

    - name: Terraform Apply
      if: github.ref == 'refs/heads/main' # Apply only on the main branch
      run: terraform apply -auto-approve -var="project_id=myzesoftlyproject27"
