name: Terraform CI/CD

on:
  push:
    branches:
      - feat/* # Triggers workflow for all branches starting with 'feat/'
  pull_request:
    branches:
      - feat/* # Optional: Also trigger on PRs for feature branches

jobs:
  terraform:
    name: Terraform Workflow
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7

      # Step 3: Authenticate with GCP using Workload Identity Federation
      - name: Authenticate with GCP
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: "projects/<PROJECT_NUMBER>/locations/global/workloadIdentityPools/<POOL_NAME>/providers/<PROVIDER_NAME>"
          service_account: "terraform-sa@<PROJECT_ID>.iam.gserviceaccount.com"

      # Step 4: Initialize Terraform
      - name: Initialize Terraform
        run: terraform init

      # Step 5: Validate Terraform Configuration
      - name: Validate Terraform
        run: terraform validate

      # Step 6: Generate Terraform Plan
      - name: Terraform Plan
        run: terraform plan -var-file="terraform.tfvars"

      # Step 7: Apply Terraform Plan (optional; for approved PRs or after testing)
      - name: Apply Terraform
        if: github.event_name == 'push'
        run: terraform apply -auto-approve -var-file="terraform.tfvars"
